<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Legacy - V1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-area">
        <div id="game" role="img" aria-label="Legacy game canvas"></div>
        <div id="deathScreen" class="overlay hidden">
          <div class="panel">
            <p class="eyebrow">A grave has appeared</p>
            <h1 id="deathTitle">Your heir awaits.</h1>
            <p id="deathSummary"></p>
            <button id="newHeirButton" type="button">Create an heir</button>
          </div>
        </div>
        <div id="startScreen" class="overlay">
          <div class="panel">
            <p class="eyebrow">Legacy V1 multiplayer</p>
            <h1>One life. A world that remembers.</h1>
            <div class="form-row">
              <label for="heroName">Name</label>
              <input id="heroName" maxlength="14" value="Kael" />
            </div>
            <div class="form-row">
              <label for="houseName">House</label>
              <input id="houseName" maxlength="18" value="Valen" />
            </div>
            <div class="appearance-grid" aria-label="Character appearance">
              <div class="form-row">
                <label for="armorSelect">Armor</label>
                <select id="armorSelect">
                  <option value="leather">Leather</option>
                  <option value="iron">Iron</option>
                  <option value="dark">Dark</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="form-row">
                <label for="helmetSelect">Helmet</label>
                <select id="helmetSelect">
                  <option value="ironCap">Iron cap</option>
                  <option value="horned">Horned</option>
                  <option value="hood">Hood</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="form-row">
                <label for="weaponSelect">Weapon</label>
                <select id="weaponSelect">
                  <option value="sword">Sword</option>
                  <option value="axe">Axe</option>
                  <option value="staff">Staff</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="form-row">
                <label for="shieldSelect">Shield</label>
                <select id="shieldSelect">
                  <option value="round">Round</option>
                  <option value="tower">Tower</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="form-row">
                <label for="capeSelect">Cape</label>
                <select id="capeSelect">
                  <option value="red">Red</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="form-row">
                <label for="mountSelect">Mount</label>
                <select id="mountSelect">
                  <option value="none">None</option>
                  <option value="horseBrown">Brown horse</option>
                  <option value="horseGrey">Grey horse</option>
                </select>
              </div>
            </div>
            <button id="startButton" type="button">Enter the haven</button>
          </div>
        </div>
        <div id="mobileControls" class="mobile-controls" aria-hidden="true">
          <div id="moveStick" class="mobile-stick">
            <div id="moveStickKnob" class="mobile-stick-knob"></div>
          </div>
          <button id="mobileAttackButton" class="mobile-attack" type="button" aria-label="Attack"></button>
        </div>
      </section>

      <aside class="sidebar">
        <header>
          <p class="eyebrow">House</p>
          <h2 id="dynastyName">-</h2>
        </header>

        <section class="stat-grid" aria-label="Character stats">
          <div><span>Level</span><strong id="levelStat">1</strong></div>
          <div><span>HP</span><strong id="hpStat">100</strong></div>
          <div><span>Gold</span><strong id="goldStat">0</strong></div>
          <div><span>Renown</span><strong id="renownStat">0</strong></div>
        </section>

        <section>
          <h3>Log</h3>
          <ol id="log" class="log"></ol>
        </section>

        <section>
          <h3>Hall of Legends</h3>
          <div id="legends" class="legends"></div>
        </section>

        <section>
          <h3>Controls</h3>
          <p class="hint">ZQSD/WASD to move. Left click or Space attacks toward the mouse. The portal connects the haven and the ruins.</p>
        </section>
      </aside>
    </main>

    <script src="node_modules/phaser/dist/phaser.js"></script>
    <script defer src="src/game.js"></script>
  </body>
</html>
