<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Legacy - Play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fondamento&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-area">
        <div id="game" role="img" aria-label="Legacy game canvas"></div>
        <div id="gameHud" class="game-hud" aria-label="Character HUD">
          <div class="hud-status">
            <div class="hud-identity">
              <strong id="dynastyName">-</strong>
              <span id="areaStat">Haven</span>
            </div>
            <div class="hud-vitals">
              <span id="levelStat">1</span>
              <div class="hp-frame" aria-label="Health">
                <div id="hpFill" class="hp-fill"></div>
                <strong id="hpStat">100</strong>
              </div>
            </div>
            <div class="hud-currencies">
              <span>Gold <strong id="goldStat">0</strong></span>
              <span>Renown <strong id="renownStat">0</strong></span>
            </div>
          </div>
          <ol id="log" class="hud-log" aria-label="Game log"></ol>
          <div class="hud-actions" aria-label="Game panels">
            <button id="inventoryButton" class="hud-action hud-inventory-button" type="button" aria-label="Inventory" title="Inventory">
              <img src="assets/generated-items/equipment-icon.png" alt="" draggable="false" />
            </button>
          </div>
        </div>
        <div id="inventoryPanel" class="game-panel inventory-panel hidden" role="dialog" aria-label="Inventory">
          <div class="inventory-header">
            <strong>Inventory</strong>
            <button id="inventoryClose" class="panel-close" type="button" aria-label="Close inventory">x</button>
          </div>
          <section class="inventory-core">
            <div id="equipmentSlots" class="equipment-slots"></div>
            <div id="inventorySlots" class="inventory-slots"></div>
            <div class="panel-gold"><span>Gold</span><strong id="inventoryGold">0</strong></div>
            <div class="inventory-footer">
              <span>Double click: equip</span>
              <span>Right click / long press: actions</span>
              <span>Esc: close</span>
            </div>
          </section>
        </div>
        <div id="characterPanel" class="hidden" aria-hidden="true"></div>
        <div id="itemMenu" class="item-menu hidden" role="menu"></div>
        <div id="itemInspect" class="item-inspect hidden" role="dialog" aria-label="Item details">
          <button id="itemInspectClose" class="panel-close" type="button" aria-label="Close item details">x</button>
          <div id="itemInspectContent"></div>
        </div>
        <div id="deathScreen" class="overlay hidden">
          <div class="panel">
            <p class="eyebrow">A grave has appeared</p>
            <h1 id="deathTitle">Your heir awaits.</h1>
            <p id="deathSummary"></p>
            <button id="respawnButton" type="button">Return to the hub</button>
          </div>
        </div>
        <div id="mobileControls" class="mobile-controls" aria-hidden="true">
          <div id="moveStick" class="mobile-stick">
            <div id="moveStickKnob" class="mobile-stick-knob"></div>
          </div>
          <button id="mobileAttackButton" class="mobile-attack" type="button" aria-label="Attack"></button>
        </div>
      </section>
    </main>

    <script src="node_modules/phaser/dist/phaser.js"></script>
    <script defer src="src/game.js"></script>
  </body>
</html>
